# CredVigil configuration. Copy to `.credvigil.yml` at your repo root and
# CredVigil will auto-discover it. CLI flags override anything set here.
# JSON (.credvigil.json) is also accepted.

output_format: text        # text | json | sarif

detection:
  min_confidence: 0.3      # 0.0–1.0; findings below this are dropped
  min_severity: info       # info | low | medium | high | critical
  enable_entropy: true     # Shannon-entropy detection for novel secrets
  enable_bpe: true         # BPE token-efficiency second statistical lens
  entropy_min_length: 12
  context_lines: 2
  max_file_size: 10485760  # 10 MB
  exclude_rule_ids: []     # rule IDs to disable, e.g. ["generic-api-key"]
  allow_list_patterns: []  # regexes; matches are suppressed as false positives

file_scanning:
  exclude_dirs: []         # extra directories to skip (merged with defaults)
  exclude_files: []        # extra filenames to skip
  exclude_extensions: []   # extra extensions to skip
  workers: 4
  follow_symlinks: false

# To baseline pre-existing findings, list fingerprints or path globs in a
# separate `.credvigilignore` file — one per line. For a single accepted
# secret, add an inline `# credvigil:allow` comment on its line instead.
