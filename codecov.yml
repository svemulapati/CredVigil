coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 70%
        informational: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "cmd/credvigil/main.go" # CLI wiring; exercised via smoke tests, not unit tests
  - "docs/**"
