# Enables CredVigil in the pre-commit framework (https://pre-commit.com).
# Consumers add this to their .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/svemulapati/CredVigil
#       rev: v0.1.0
#       hooks:
#         - id: credvigil
#
- id: credvigil
  name: CredVigil secret scan
  description: Scan staged files for exposed credentials.
  entry: credvigil scan
  language: golang
  pass_filenames: true
  types: [text]
  require_serial: false
