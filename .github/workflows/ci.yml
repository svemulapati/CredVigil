name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      matrix:
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      # Upload only when a CODECOV_TOKEN secret is configured; tokenless uploads
      # are rejected and would otherwise fail the job.
      - name: Upload coverage
        if: matrix.go == '1.26' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.txt
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Build golangci-lint from source with the runner's Go so it can
          # target the module's Go 1.25 (prebuilt binaries lag the Go release).
          install-mode: goinstall

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Build
        run: go build -trimpath -o credvigil ./cmd/credvigil
      - name: Smoke test
        run: |
          ./credvigil version
          ./credvigil scan --format sarif testdata/ > out.sarif || true
          test -s out.sarif && echo "SARIF generated"

  self-scan:
    name: CredVigil scans itself
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Build
        run: go build -o credvigil ./cmd/credvigil
      - name: Scan (excluding test fixtures)
        run: |
          echo 'testdata/' > .credvigilignore
          ./credvigil scan --format sarif . > credvigil.sarif || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: credvigil.sarif
        continue-on-error: true
