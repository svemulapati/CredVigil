# golangci-lint configuration. Run `make lint` locally (requires golangci-lint).
run:
  timeout: 5m
  tests: true

# golangci-lint runs its default set (errcheck, gosimple, govet, ineffassign,
# staticcheck, unused) plus the extras enabled below. `revive` is intentionally
# left off for now — the pre-existing code has many undocumented exports.
linters:
  enable:
    - misspell
    - unconvert
    - gofmt

linters-settings:
  misspell:
    locale: US
    # Product names / BPE token fragments that misspell flags as typos.
    ignore-words:
      - robocorp # Robot Framework / Robocorp (product name)
      - ect # a BPE token fragment in pkg/entropy, not "etc"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files may use less strict error handling for brevity.
    - path: _test\.go
      linters:
        - errcheck
