# golangci-lint configuration. Run `make lint` locally (requires golangci-lint).
run:
  timeout: 5m
  tests: true

# Baseline linter set — reliably clean on the current tree. The stricter
# linters (errcheck, staticcheck, revive, unused) are intentionally deferred:
# the pre-existing codebase has many unchecked fmt.Fprintf/Sscanf calls and
# undocumented exports. Enable them incrementally as the code is cleaned up.
linters:
  enable:
    - govet
    - ineffassign
    - misspell
    - unconvert
    - gofmt

linters-settings:
  misspell:
    locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files may use less strict error handling for brevity.
    - path: _test\.go
      linters:
        - errcheck
